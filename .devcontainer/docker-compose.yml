services:
  app:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    volumes:
      - ..:/workspace:cached
      # Shadow the host's .env so the container gets its own independent copy
      # at .devcontainer/.env (gitignored). `initializeCommand` in
      # devcontainer.json creates the file if it doesn't exist so this mount
      # doesn't fail on a fresh clone.
      - ./.env:/workspace/.env
      # Isolate the container's node_modules from the host's via a named volume.
      # Without this, host (darwin) and container (linux) pnpm installs clobber
      # each other and each reopen triggers a full reinstall.
      - node-modules:/workspace/node_modules
      - pnpm-store:/home/node/.local/share/pnpm/store
      - command-history:/commandhistory
      - claude-config:/home/node/.claude
    command: sleep infinity

volumes:
  node-modules:
  pnpm-store:
  command-history:
  claude-config:
