name: Start Services
description: Starts storage and database services for tests

inputs:
  database:
    description: 'Database type: mongodb, mongodb-atlas, cosmosdb, documentdb, firestore, postgres, postgres-custom-schema, postgres-uuid, postgres-uuidv7, postgres-read-replica, postgres-read-replicas, vercel-postgres-read-replica, sqlite, sqlite-uuid, sqlite-uuidv7, supabase, mssql, d1'
    required: true

outputs:
  POSTGRES_URL:
    description: PostgreSQL connection URL
    value: ${{ steps.postgres.outputs.url }}
  MSSQL_URL:
    description: SQL Server connection URL
    value: ${{ steps.mssql.outputs.url }}
  MONGODB_URL:
    description: MongoDB connection URL
    value: ${{ steps.mongodb.outputs.url }}
  MONGODB_ATLAS_URL:
    description: MongoDB Atlas connection URL
    value: ${{ steps.mongodb-atlas.outputs.url }}

runs:
  using: composite
  steps:
    - name: Start storage services
      shell: bash
      run: |
        for i in 1 2 3; do
          docker compose -f test/docker-compose.yml --profile storage pull && break
          echo "Pull attempt $i/3 for 'storage' profile failed, retrying in 10s..."
          sleep 10
        done
        docker compose -f test/docker-compose.yml --profile storage up -d --wait

    - name: Start Redis
      shell: bash
      run: |
        for i in 1 2 3; do
          docker compose -f test/docker-compose.yml --profile redis pull && break
          echo "Pull attempt $i/3 for 'redis' profile failed, retrying in 10s..."
          sleep 10
        done
        docker compose -f test/docker-compose.yml --profile redis up -d --wait

    - name: Start MongoDB
      id: mongodb
      if: contains(fromJSON('["mongodb", "cosmosdb", "documentdb", "firestore"]'), inputs.database)
      shell: bash
      run: |
        for i in 1 2 3; do
          docker compose -f test/docker-compose.yml --profile mongodb pull && break
          echo "Pull attempt $i/3 for 'mongodb' profile failed, retrying in 10s..."
          sleep 10
        done
        docker compose -f test/docker-compose.yml --profile mongodb up -d --wait
        echo "url=mongodb://payload:payload@localhost:27018/payload?authSource=admin&directConnection=true&replicaSet=rs0" >> $GITHUB_OUTPUT

    - name: Start MongoDB Atlas Local
      id: mongodb-atlas
      if: inputs.database == 'mongodb-atlas'
      shell: bash
      run: |
        for i in 1 2 3; do
          docker compose -f test/docker-compose.yml --profile mongodb-atlas pull && break
          echo "Pull attempt $i/3 for 'mongodb-atlas' profile failed, retrying in 10s..."
          sleep 10
        done
        docker compose -f test/docker-compose.yml --profile mongodb-atlas up -d --wait
        echo "url=mongodb://localhost:27019/payload?directConnection=true&replicaSet=mongodb-atlas-local" >> $GITHUB_OUTPUT

    - name: Start PostgreSQL
      id: postgres
      if: startsWith(inputs.database, 'postgres')
      shell: bash
      run: |
        for i in 1 2 3; do
          docker compose -f test/docker-compose.yml --profile postgres pull && break
          echo "Pull attempt $i/3 for 'postgres' profile failed, retrying in 10s..."
          sleep 10
        done
        docker compose -f test/docker-compose.yml --profile postgres up -d --wait
        echo "url=postgresql://payload:payload@localhost:5433/payload" >> $GITHUB_OUTPUT

    - name: Start SQL Server
      id: mssql
      if: startsWith(inputs.database, 'mssql')
      shell: bash
      run: |
        for i in 1 2 3; do
          docker compose -f test/docker-compose.yml --profile mssql pull && break
          echo "Pull attempt $i/3 for 'mssql' profile failed, retrying in 10s..."
          sleep 10
        done
        docker compose -f test/docker-compose.yml --profile mssql up -d --wait
        echo "url=sqlserver://localhost:1433;database=payload;user=sa;password=Payload1234;trustServerCertificate=true" >> $GITHUB_OUTPUT

    - name: Export PostgreSQL replica URL
      if: contains(fromJSON('["postgres-read-replica", "postgres-read-replicas", "vercel-postgres-read-replica"]'), inputs.database)
      shell: bash
      run: echo "POSTGRES_REPLICA_URL=postgresql://payload:payload@localhost:5434/payload" >> $GITHUB_ENV

    - name: Configure PostgreSQL custom schema
      if: inputs.database == 'postgres-custom-schema'
      shell: bash
      run: |
        docker exec postgres-payload-test psql -U payload -d payload -c "CREATE SCHEMA custom;"

    - name: Start Supabase
      id: supabase
      if: inputs.database == 'supabase'
      uses: supabase/setup-cli@v1
      with:
        # Pinned instead of `latest` to skip setup-cli's GitHub API release lookup,
        # which flakes on shared CI runners with "rate limit exceeded" (unauthenticated
        # 60 req/hr limit). A fixed version short-circuits that call entirely.
        version: 2.104.0

    - name: Initialize Supabase
      if: inputs.database == 'supabase'
      shell: bash
      run: |
        supabase init
        # Tests connect directly to Postgres on 54322 (see test/dbAdapters.ts), so exclude every
        # other service. This kills the flaky edge-runtime container whose Deno-dependency boot
        # fails health checks with a 502 on CI, and slashes startup time/RAM.
        supabase start -x edge-runtime,studio,postgres-meta,logflare,vector,imgproxy,storage-api,gotrue,realtime,postgrest,kong,mailpit,supavisor
